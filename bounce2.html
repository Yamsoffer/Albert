<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert - Quantum Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      background: #191919;
      background-image: url('bounce-assets/background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #C9CBC0;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      max-width: 600px;
    }

    .mascot-wrapper {
      position: relative;
      width: 100%;
      height: 300px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .mascot {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: bounce 2s infinite ease-in;
    }

    .mascot img {
      height: auto;
      max-height: 100%;
      width: auto;
      max-width: 100%;
      display: block;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.8));
    }

    @keyframes bounce {
      /* Crouching */
      0% {
        transform: translateY(20px);
      }
      15% {
        transform: translateY(20px);
      }

      /* Rising */
      20% {
        transform: translateY(-30px);
      }
      30% {
        transform: translateY(-80px);
      }

      /* Peak */
      45% {
        transform: translateY(-150px);
      }
      65% {
        transform: translateY(-150px);
      }

      /* Falling */
      80% {
        transform: translateY(-40px);
      }
      90% {
        transform: translateY(10px);
      }

      /* Back to crouch */
      100% {
        transform: translateY(20px);
      }
    }

    .text {
      text-align: center;
    }

    .title {
      font-size: 56px;
      font-weight: 900;
      color: #119DA4;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 700;
      color: #d7f75b;
      letter-spacing: 0.05em;
    }

    .dot {
      color: #d7f75b;
      margin-left: 8px;
    }

    @media (max-width: 600px) {
      .title {
        font-size: 36px;
      }
      .subtitle {
        font-size: 14px;
      }
      .mascot-wrapper {
        height: 200px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="mascot-wrapper">
    <div class="mascot">
      <img src="bounce-assets/jumping.png" alt="Albert bouncing">
    </div>
  </div>

  <div class="text">
    <div class="title">
      ALBERT<span class="dot">●</span>
    </div>
    <div class="subtitle">Thank you, everyone, for an exceptional day! 5:00 PM – We'll all gather in the central area on the 11th floor for the project presentations.</div>
  </div>
</div>

</body>
</html>
